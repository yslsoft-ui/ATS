# ==============================================================================
# 트레이딩 시스템 전역 설정 파일 (settings.yaml)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 시스템 코어 및 GIRSScorer / 자동 승격 설정
# ------------------------------------------------------------------------------
system:
  # 시스템 메인 DB(SQLite) 경로
  db_path: data/backtest.db

  # 전략 소스코드 디렉토리 경로
  strategies_dir: src/engine/strategies

  # 시스템 전역 로그 레벨 (DEBUG, INFO, WARNING, ERROR)
  log_level: INFO

  # AI 기반의 새로운 거래 전략 제안 자동 생성 여부
  enable_auto_proposal: false

  # 운영 모드 설정 (shadow: 모의/섀도 모드, live: 실거래 모드)
  operation_mode: shadow

  # GIRS(Grading & Intelligence Promotion System) 섀도 평가 모드 활성화 여부
  girs_shadow_mode: true

  # 실거래 집행 엔진 기동 여부 (실 자금 투입 차단)
  live_trading_enabled: false

  # 모의투자(Simulation) 엔진 기동 여부
  simulation_trading_enabled: true

  # 섀도 평가 완료 후 챔피언 전략의 자동 실투자 승격 프로세스 기동 여부
  auto_strategy_promotion_enabled: false

  # GIRS Scorer 안정성 점수(stability_score) 산출 공식의 가중치 파라미터
  stability:
    market_std_weight: 1.0     # 시장 변동성 변화율(std) 가중치
    market_mean_weight: 0.5    # 시장 변동성 절대 강도(mean) 가중치 (고변동성 지속 상황 방어)
    system_jitter_weight: 1.0  # 지연시간 지터(jitter) 가중치
    system_latency_weight: 0.5 # 평균 지연시간(latency) 가중치 (지속적 고지연 상황 방어)

  # 전략 슬라이스 평가 시 필요한 최소 샘플 거래 횟수
  report_min_samples_per_slice: 30

  # 전략 평가 락(Lock) 유지 제한 시간 (초 단위)
  evaluation_lock_timeout_seconds: 300

  # 전략 평가 실패 시 최대 재시도 횟수
  evaluation_max_retry_count: 3

  # 오더북(호가창) 기반 피처 빌드 활성화 여부
  enable_orderbook_features: false

  # 승격 후보 프록시 평가 윈도우 시간 (초 단위)
  candidate_proxy_window_seconds: 60

  # 승격 후보 프록시 유효 최소 초당 트랜잭션수 (TPS)
  candidate_proxy_min_tps: 0.1

  # 섀도 평가 기간 동안 필수적으로 발생해야 하는 최소 거래 횟수
  shadow_min_trades_limit: 3

  # 챔피언 전략의 강등 후 또는 승격 후 재승격 방지를 위한 쿨다운 기간 (일 단위)
  champion_cooldown_days: 7.0

  # 챔피언 전략의 쿨다운 기간 동안 요구되는 최소 거래 횟수
  champion_cooldown_trades: 100

  # GIRS 자동 승격 차단을 위한 리스크 컷오프 임계치 (컷오프보다 리스크가 높으면 승격 보류)
  girs_risk_cutoff:
    default: 0.5     # 기본 임계치
    crypto: 0.4      # 가상자산 전용 임계치
    stock: 0.6       # 국내주식 전용 임계치
    horizons:        # 투자 기간(타임 프레임)별 임계치
      1d: 0.45
      3d: 0.5
      7d: 0.55
    market_horizons: # 특정 자산군 및 타임프레임 조합 임계치
      crypto.1d: 0.42

  # 실시간 데이터 및 지표의 Freshness 만료 임계치 (초 단위, 초과 시 데이터 붕괴로 판단)
  freshness_ttl:
    crypto:
      trade: 10      # 가상자산 거래 체결 데이터 만료 시간
      indicator: 60  # 가상자산 기술 지표 만료 시간
    stock:
      trade: 30      # 주식 거래 데이터 만료 시간
      indicator: 120 # 주식 기술 지표 만료 시간

  # 백테스트 및 섀도 평가 시 사용하는 분석 타임프레임 정의
  horizons:
    crypto:
      - name: 1d
        type: elapsed
        value: 86400  # 1일 경과 초 (24시간)
      - name: 3d
        type: elapsed
        value: 259200 # 3일 경과 초
      - name: 7d
        type: elapsed
        value: 604800 # 7일 경과 초
    stock:
      - name: 1d
        type: calendar_session
        value: 1_day       # 주식 영업일 기준 1일
      - name: 3d
        type: calendar_session
        value: 3_days      # 주식 영업일 기준 3일
      - name: 7d
        type: calendar_session
        value: 7_days      # 주식 영업일 기준 7일

  # 자동 승격 및 시스템 리소스 보호를 위한 가드레일 설정
  resource_guards:
    exchange_quota:  # 거래소별 유니버스 최대 보유 종목 수 한도
      upbit: 30
      kis: 20
      bithumb: 15
    symbol_cooldown_seconds: 3600  # 종목이 후보군에서 제외/강등된 후 재승격 신청 시까지의 쿨다운 (초)
    daily_proposal_limit: 100      # 일일 최대 생성 가능한 AI 제안 개수 한도

  # 공통 청산 규칙 설정 (엔진 전역 적용)
  exit_rules:
    stop_loss_pct: 2.0         # 손절 임계값 (%, 0이면 비활성)
    trailing_stop_pct: 1.5     # 트레일링 스탑 활성화 (%, 0이면 비활성)
    time_limit_seconds: 300   # 시간 제한 탈출 (초, 0이면 비활성)
    stop_loss_basis: "net_pnl" # 손절 기준 ("price": 단순 가격, "net_pnl": 매매 비용 반영 순손익률)
    breakeven_activation_pct: 0.5 # 본전이동 활성화 기준 순손익률 (%)

  # 거래소별 실시간 매매비용(수수료, 세금, 슬리피지 및 안전마진) 설정
  # slippage_pct는 매수와 매도 각각에 1회씩 적용되는 예상 불리 체결률입니다.
  execution_cost:
    default:
      buy_fee_pct: 0.0
      sell_fee_pct: 0.0
      sell_tax_pct: 0.0
      slippage_pct: 0.0
      safety_buffer_pct: 0.0
    upbit:
      buy_fee_pct: 0.05
      sell_fee_pct: 0.05
      sell_tax_pct: 0.0
      slippage_pct: 0.05
      safety_buffer_pct: 0.02
    bithumb:
      buy_fee_pct: 0.25
      sell_fee_pct: 0.25
      sell_tax_pct: 0.0
      slippage_pct: 0.05
      safety_buffer_pct: 0.02
    kis:
      buy_fee_pct: 0.015
      sell_fee_pct: 0.015
      sell_tax_pct: 0.20
      slippage_pct: 0.05
      safety_buffer_pct: 0.02


# ------------------------------------------------------------------------------
# 2. 데이터 수집기 (Collector) 설정
# ------------------------------------------------------------------------------
collector:
  # 데이터 수집기 구동 시 과거 캔들 사전 워밍업 실행 여부
  warmup_enabled: true

  # 비동기 데이터 수집을 담당할 동시성 워커 스레드/코루틴 수
  worker_count: 2

  # 수집기가 데이터를 영하화할 타겟 DB 경로
  db_path: data/backtest.db

  # 과거 데이터 백필(Backfill) 설정
  backfill:
    enabled: true
    max_hours: 24   # 최대 백필 시간 (최근 24시간)
    delays:         # API Rate Limit 준수를 위한 요청 간 지연 시간 (초)
      upbit: 0.2
      bithumb: 0.2
      kis: 0.2

  # --- 수집기 상태 모니터링 및 제어 관련 임계값 (ms) ---
  daemon_detail_stale_ms: 15000
  active_symbols_stale_ms: 75000
  request_symbols_sync_cooldown_ms: 10000
  control_ack_timeout_ms: 5000

  # 자동 상장/상장폐지 감지 스케줄러 설정 (초 단위)
  scheduler:
    bithumb_notice_poll_interval: 43200   # 빗썸 공지 폴링 주기 (12시간 = 43200초)
    upbit_market_poll_interval: 3600      # 업비트 마켓 리스트 감지 주기 (1시간 = 3600초)
    kis_mst_sync_interval: 86400         # KIS 마스터 파일 동기화 주기 (24시간 = 86400초)


# ------------------------------------------------------------------------------
# 3. 트레이딩 전략별 파라미터 및 활성화 설정
# ------------------------------------------------------------------------------
strategies:
  # RSI (Relative Strength Index) 기반 모멘텀 전략
  RSIStrategy:
    enabled: false
    params:
      rsi_window: 14      # RSI 지표의 롤링 계산 윈도우 크기
      buy_threshold: 30   # 과매도(매수 시그널) 임계치
      sell_threshold: 70  # 과매수(매도 시그널) 임계치
    overrides:            # 특정 거래소별 오버라이드 설정
      kis:
        params:
          rsi_window: 20
          buy_threshold: 35
          sell_threshold: 65

  # MACD (Moving Average Convergence Divergence) 추세추종 전략
  MACDStrategy:
    enabled: false
    params:
      fast_period: 13 # 단기 지수이동평균 기간
      slow_period: 26 # 장기 지수이동평균 기간
      signal_period: 9 # MACD 시그널선 기간

  # 거래대금/거래량 가중 강도 기반 전략
  VolumePowerStrategy:
    enabled: false
    params:
      buy_threshold: 120.0
      sell_threshold: 80.0

  # 순차적 다중 전략 검증 체인 (RSI 진입 후 MACD 확인 등)
  SequentialStrategy:
    enabled: false
    params:
      first_strategy_id: rsi_strategy
      second_strategy_id: macd_strategy
      wait_candles: 3

  # 갑작스러운 거래량 급증 및 가격 돌파 감지 전략
  MomentumSpikeStrategy:
    enabled: false
    params:
      lookback_periods: 20       # 기준 윈도우 크기
      vol_multiplier: 3.0        # 평균 거래량 대비 거래량 증가 배수
      freq_multiplier: 2.0       # 평균 트래픽 빈도 증가 배수
      buy_ratio_threshold: 0.7   # 전체 주문 중 매수 비중 비율 임계치
      price_change_threshold: 0.3 # 가격 변동률 돌파 임계치 (%)
      trailing_stop_pct: 1.5     # 트레일링 스탑 비율 (%)

  # 시장 패닉(가격 폭락 및 투매 발생) 시 역추세 진입 전략
  PanicStrategy:
    enabled: false
    params:
      vol_multiplier: 3.0
      drop_threshold: 0.02

  # 가격 추세 왜곡 감지 및 반등 추종 전략
  TrendBendStrategy:
    enabled: false
    params:
      lookback: 5

  # 단순 모멘텀 추종 전략
  MomentumStrategy:
    enabled: false
    params:
      period: 15

  # 볼린저 밴드 및 RSI, 스탑로스를 결합한 단기 모멘텀 복합 전략
  ShortTermMomentumStrategy:
    enabled: true
    params:
      fast_window: 5
      slow_window: 20
      rsi_window: 14
      rsi_buy_threshold: 55.0
      rsi_sell_threshold: 80.0
      bb_window: 20
      bb_std: 2.0
      stop_loss_pct: 2.0
      trailing_stop_pct: 2.5


# ------------------------------------------------------------------------------
# 4. 거래소별 API 접속 정보 및 수수료 설정
# ------------------------------------------------------------------------------
exchanges:
  # 업비트 (Upbit) 가상자산 거래소 설정
  upbit:
    enabled: true
    api_key: ${UPBIT_ACCESS_KEY}     # 환경변수로부터 키 로드 (.env 참조)
    api_secret: ${UPBIT_SECRET_KEY}  # 환경변수로부터 시크릿 로드 (.env 참조)
    fee_rate: 0.0005                 # 거래 수수료율 (0.05%)
    websocket_url: wss://api.upbit.com/websocket/v1
    api_url: https://api.upbit.com/v1
    order_history_limit: 50          # 조회할 최대 주문 이력 수

  # 한국투자증권 (KIS) 국내주식 OpenAPI 설정
  kis:
    enabled: true
    app_key: ${KIS_APP_KEY}          # 환경변수로부터 앱키 로드 (.env 참조)
    app_secret: ${KIS_APP_SECRET}    # 환경변수로부터 앱시크릿 로드 (.env 참조)
    account_no: ${KIS_ACCOUNT_NO}    # 종합위탁 계좌번호 (.env 참조)
    user_id: ${KIS_USER_ID}          # 사용자 고유 ID (HTS ID 등, .env 참조)
    fee_rate: 0.00015                # 수수료율 (0.015%)
    api_url: https://openapi.koreainvestment.com:9443
    websocket_url: ws://ops.koreainvestment.com:21000
    market_hours:                    # 정규 거래 가능 시간대
      start_time: '07:50'
      end_time: '20:10'

  # 빗썸 (Bithumb) 가상자산 거래소 설정
  bithumb:
    enabled: true
    api_key: ${BITHUMB_API_KEY}      # 환경변수로부터 키 로드 (.env 참조)
    api_secret: ${BITHUMB_SECRET_KEY} # 환경변수로부터 시크릿 로드 (.env 참조)
    fee_rate: 0.0025                 # 거래 수수료율 (0.25%)
    websocket_url: wss://ws-api.bithumb.com/websocket/v1
    api_url: https://api.bithumb.com/v1
