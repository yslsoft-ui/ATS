    enabled: true
    params:
      rsi_window: 14
      buy_threshold: 30
      sell_threshold: 70
    overrides:
      kis:
        params:
          rsi_window: 20
          buy_threshold: 35
          sell_threshold: 65
  macdstrategy:
    enabled: false
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
  volumepowerstrategy:
    enabled: false
    params:
      buy_threshold: 120.0
      sell_threshold: 80.0
  sequentialstrategy:
