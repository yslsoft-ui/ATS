system:
  db_path: data/backtest.db
  strategies_dir: src/engine/strategies
  log_level: INFO
  enable_auto_proposal: false
  operation_mode: shadow
  girs_shadow_mode: true
  live_trading_enabled: false
  simulation_trading_enabled: true
  auto_strategy_promotion_enabled: false
  report_min_samples_per_slice: 30
  evaluation_lock_timeout_seconds: 300
  evaluation_max_retry_count: 3
  enable_orderbook_features: false
  candidate_proxy_window_seconds: 60
  candidate_proxy_min_tps: 0.1
  shadow_min_trades_limit: 3
  champion_cooldown_days: 7.0
  champion_cooldown_trades: 100
  girs_risk_cutoff:
    default: 0.5
    crypto: 0.4
    stock: 0.6
    horizons:
      1d: 0.45
      3d: 0.5
      7d: 0.55
    market_horizons:
      crypto.1d: 0.42
  freshness_ttl:
    crypto:
      trade: 10
      indicator: 60
    stock:
      trade: 30
      indicator: 120
  horizons:
    crypto:
    - name: 1d
      type: elapsed
      value: 86400
    - name: 3d
      type: elapsed
      value: 259200
    - name: 7d
      type: elapsed
      value: 604800
    stock:
    - name: 1d
      type: calendar_session
      value: 1_day
    - name: 3d
      type: calendar_session
      value: 3_days
    - name: 7d
      type: calendar_session
      value: 7_days
  resource_guards:
    exchange_quota:
      upbit: 30
      kis: 20
      bithumb: 15
    symbol_cooldown_seconds: 3600
    daily_proposal_limit: 100
collector:
  warmup_enabled: true
  worker_count: 2
  db_path: data/backtest.db
  backfill:
    enabled: true
    max_hours: 24
    delays:
      upbit: 0.2
      bithumb: 0.2
      kis: 0.2
strategies:
  rsistrategy:
    enabled: true
    params:
      rsi_window: 14
      buy_threshold: 30
      sell_threshold: 70
    overrides:
      kis:
        params:
          rsi_window: 20
          buy_threshold: 35
          sell_threshold: 65
  macdstrategy:
    enabled: false
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
  volumepowerstrategy:
    enabled: false
    params:
      buy_threshold: 120.0
      sell_threshold: 80.0
  sequentialstrategy:
    enabled: false
    params:
      first_strategy_id: rsi_strategy
      second_strategy_id: macd_strategy
      wait_candles: 3
  momentumspikestrategy:
    enabled: false
    params:
      lookback_periods: 20
      vol_multiplier: 3.0
      freq_multiplier: 2.0
      buy_ratio_threshold: 0.7
      price_change_threshold: 0.3
      trailing_stop_pct: 1.5
  panicstrategy:
    enabled: false
    params:
      vol_multiplier: 3.0
      drop_threshold: 0.02
  trendbendstrategy:
    enabled: false
    params:
      lookback: 5
  momentumstrategy:
    enabled: false
    params:
      period: 15
  shorttermmomentumstrategy:
    enabled: false
    params:
      fast_window: 5
      slow_window: 20
      rsi_window: 14
      rsi_buy_threshold: 55.0
      rsi_sell_threshold: 80.0
      bb_window: 20
      bb_std: 2.0
      stop_loss_pct: 2.0
      trailing_stop_pct: 2.5
