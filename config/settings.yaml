system:
  db_path: data/backtest.db
  strategies_dir: src/engine/strategies
  log_level: INFO
collector:
  warmup_enabled: true
  worker_count: 2
  db_path: data/backtest.db
  backfill:
    enabled: true
    max_hours: 24
    delays:
      upbit: 0.2
      bithumb: 0.2
      kis: 0.2
strategies:
