system:
  db_path: data/backtest.db
  strategies_dir: src/engine/strategies
  log_level: INFO
collector:
  warmup_enabled: true
  worker_count: 2
  db_path: data/backtest.db
strategies:
  rsistrategy:
    enabled: true
    params:
      rsi_window: 14
      buy_threshold: 30
      sell_threshold: 70
    overrides:
      kis:
        params:
          rsi_window: 20  # 주식은 노이즈가 적어 더 긴 윈도우 권장
          buy_threshold: 35 # 주식은 코인보다 덜 과매도되는 경향이 있음
          sell_threshold: 65
  macdstrategy:
    enabled: false
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
  volumepowerstrategy:
    enabled: false
    params:
      buy_threshold: 120.0
      sell_threshold: 80.0
  sequentialstrategy:
    enabled: false
    params:
      first_strategy_id: rsi_strategy
      second_strategy_id: macd_strategy
      wait_candles: 3
  momentumspikestrategy:
    enabled: false
    params:
      lookback_periods: 20
      vol_multiplier: 3.0
      freq_multiplier: 2.0
      buy_ratio_threshold: 0.7
      price_change_threshold: 0.3
      trailing_stop_pct: 1.5
  panicstrategy:
    enabled: false
    params:
      vol_multiplier: 3.0
      drop_threshold: 0.02
  trendbendstrategy:
    enabled: false
    params:
      lookback: 5
  momentumstrategy:
    enabled: false
    params:
      period: 15
exchanges:
  upbit:
    enabled: true
    api_key: "${UPBIT_ACCESS_KEY}"
    api_secret: "${UPBIT_SECRET_KEY}"
    fee_rate: 0.0005
    websocket_url: "wss://api.upbit.com/websocket/v1"
    api_url: "https://api.upbit.com/v1" # 업비트 REST API 공통 주소 (/v1 포함)
    symbols: [] # 빈 리스트일 경우 KRW 전체 종목 자동 로드
  kis:
    enabled: true
    app_key: "${KIS_APP_KEY}"
    app_secret: "${KIS_APP_SECRET}"
    account_no: "${KIS_ACCOUNT_NO}"
    is_vts: true # 모의투자 서버 사용 여부
    fee_rate: 0.00015 # 국내 주식 표준 수수료 예시
    websocket_url: "ws://ops.koreainvestment.com:31000" # 실전: ws://ops.koreainvestment.com:21000, 모의: ws://ops.koreainvestment.com:31000
    symbols: ["005930", "000660", "035420"] # 삼성전자, SK하이닉스, NAVER
  bithumb:
    enabled: true
    api_key: "${BITHUMB_API_KEY}"
    api_secret: "${BITHUMB_SECRET_KEY}"
    fee_rate: 0.0025 # 빗썸 기본 수수료
    websocket_url: "wss://ws-api.bithumb.com/websocket/v1"
    api_url: "https://api.bithumb.com/v1" # 빗썸 REST API 공통 주소 (/v1 포함)
    symbols: []
    # symbols: ["BTC", "ETH", "XRP", "SOL", "DOGE"]
