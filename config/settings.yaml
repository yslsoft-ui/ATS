      lookback_periods: 20
      vol_multiplier: 3.0
      freq_multiplier: 2.0
      buy_ratio_threshold: 0.7
      price_change_threshold: 0.3
      trailing_stop_pct: 1.5
  panicstrategy:
    enabled: false
    params:
      vol_multiplier: 3.0
      drop_threshold: 0.02
  trendbendstrategy:
    enabled: false
    params:
      lookback: 5
  momentumstrategy:
    enabled: false
    params:
      period: 15
