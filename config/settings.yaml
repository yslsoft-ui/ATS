system:
  db_path: data/backtest.db
  strategies_dir: src/engine/strategies
  log_level: INFO
collector:
  warmup_enabled: true
  worker_count: 2
  db_path: data/backtest.db
  backfill:
    enabled: true
    max_hours: 24
    delays:
      upbit: 0.2
      bithumb: 0.2
      kis: 0.1
strategies:
  rsistrategy:
    enabled: true
    params:
      rsi_window: 14
      buy_threshold: 30
      sell_threshold: 70
    overrides:
      kis:
        params:
          rsi_window: 20
          buy_threshold: 35
          sell_threshold: 65
  macdstrategy:
    enabled: false
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
  volumepowerstrategy:
    enabled: false
    params:
      buy_threshold: 120.0
      sell_threshold: 80.0
  sequentialstrategy:
    enabled: false
    params:
      first_strategy_id: rsi_strategy
      second_strategy_id: macd_strategy
      wait_candles: 3
  momentumspikestrategy:
    enabled: false
    params:
      lookback_periods: 20
      vol_multiplier: 3.0
      freq_multiplier: 2.0
      buy_ratio_threshold: 0.7
      price_change_threshold: 0.3
      trailing_stop_pct: 1.5
  panicstrategy:
    enabled: false
    params:
      vol_multiplier: 3.0
      drop_threshold: 0.02
  trendbendstrategy:
    enabled: false
    params:
      lookback: 5
  momentumstrategy:
    enabled: false
    params:
      period: 15
exchanges:
  upbit:
    enabled: true
    api_key: "${UPBIT_ACCESS_KEY}"
    api_secret: "${UPBIT_SECRET_KEY}"
    fee_rate: 0.0005
    websocket_url: wss://api.upbit.com/websocket/v1
    api_url: https://api.upbit.com/v1
    symbols: []
  kis:
    enabled: true
    app_key: "${KIS_APP_KEY}"
    app_secret: "${KIS_APP_SECRET}"
    account_no: "${KIS_ACCOUNT_NO}"
    user_id: "${KIS_USER_ID}"  # KIS HTS 사용자 ID (조건검색 기능에 필수)
    fee_rate: 0.00015
    api_url: https://openapi.koreainvestment.com:9443
    websocket_url: ws://ops.koreainvestment.com:21000
    symbols: []
    market_hours:
      start_time: 07:50
      end_time: '18:10'
  bithumb:
    enabled: true
    api_key: "${BITHUMB_API_KEY}"
    api_secret: "${BITHUMB_SECRET_KEY}"
    fee_rate: 0.0025
    websocket_url: wss://ws-api.bithumb.com/websocket/v1
    api_url: https://api.bithumb.com/v1
    symbols: []
