<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upbit Real-time Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="logo">🚀 UPBIT TERMINAL</div>
            <nav class="menu">
                <div class="menu-item active">📊 모니터링</div>
                <div class="menu-item">🌐 마켓</div>
                <div class="menu-item">🔔 알림</div>
                <div class="menu-item">⚙️ 설정</div>
            </nav>
            <div class="sidebar-config">
                <label>모니터링 종목</label>
                <select id="symbol-select">
                    <option value="KRW-BTC" selected>BTC</option>
                </select>

                <label>캔들 간격</label>
                <div id="interval-btn-group" class="interval-btn-group">
                    <button class="interval-btn" data-value="1">1초</button>
                    <button class="interval-btn" data-value="3">3초</button>
                    <button class="interval-btn" data-value="5">5초</button>
                    <button class="interval-btn" data-value="10">10초</button>
                    <button class="interval-btn" data-value="30">30초</button>
                    <button class="interval-btn active" data-value="60">1분</button>
                    <button class="interval-btn" data-value="180">3분</button>
                    <button class="interval-btn" data-value="300">5분</button>
                    <button class="interval-btn" data-value="600">10분</button>
                </div>

                <button id="go-live-btn" class="live-btn" style="display: none;">📊 실시간 모드로 전환</button>

                
                <div class="indicator-config">
                    <label>지표 설정</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="show-sma" checked> SMA (20)</label>
                        <label><input type="checkbox" id="show-bb" checked> Bollinger Bands</label>
                        <label><input type="checkbox" id="show-volume" checked> Volume</label>
                        <label><input type="checkbox" id="show-rsi" checked> RSI (14)</label>
                    </div>
                </div>

            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="content">
            <!-- 모니터링 뷰 -->
            <section id="monitoring-view">
                <header class="main-header">
                    <div class="symbol-info">
                        <h1 id="current-symbol">KRW-BTC</h1>
                        <div id="status-badge" class="badge">CONNECTED</div>
                    </div>
                    <div class="header-metrics">
                        <div class="metric">
                            <span class="label">현재가</span>
                            <span id="price-metric" class="value">0</span>
                        </div>
                        <div class="metric">
                            <span class="label">24h 변동</span>
                            <span id="change-metric" class="value">0%</span>
                        </div>
                    </div>
                </header>

                <div class="chart-container">
                    <div id="main-chart"></div>
                </div>

                <section class="trade-history">
                    <h3>최신 체결 내역 (PUSH)</h3>
                    <div class="table-wrapper">
                        <table id="trade-table">
                            <thead>
                                <tr>
                                    <th>시간</th>
                                    <th>가격</th>
                                    <th>수량</th>
                                    <th>구분</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>
            </section>

            <!-- 마켓 뷰 (초기엔 숨김) -->
            <section id="market-view" style="display: none;">
                <header class="main-header">
                    <h1>🌐 마켓 현황 <span id="market-count" class="market-count-badge"></span></h1>
                    <input type="text" id="market-search" class="dark-input market-search" placeholder="코인명 또는 코드 검색...">
                </header>
                <div class="market-table-wrapper">
                    <table id="market-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>코인</th>
                                <th style="text-align:right">현재가</th>
                                <th style="text-align:right">변동률(24h)</th>
                                <th style="text-align:right">고가</th>
                                <th style="text-align:right">저가</th>
                                <th style="text-align:right">거래대금(24h)</th>
                            </tr>
                        </thead>
                        <tbody id="market-tbody"></tbody>
                    </table>
                </div>
            </section>

            <!-- 알림 뷰 (초기엔 숨김) -->
            <section id="alert-view" style="display: none;">
                <header class="main-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>🔔 급등 알림 기록 <span id="alert-count" class="market-count-badge"></span></h1>
                    <div style="display: flex; gap: 10px;">
                        <button id="btn-toggle-alerts" class="btn sm primary" onclick="toggleAlerts()">🔔 알림 팝업: ON</button>
                        <button class="btn sm danger" onclick="clearAlertHistory()">🗑️ 전체 내역 삭제</button>
                    </div>
                </header>
                <div class="market-table-wrapper">
                    <table id="alert-table">
                        <thead>
                            <tr>
                                <th>시간</th>
                                <th>코인</th>
                                <th style="text-align:right">포착가</th>
                                <th style="text-align:right">변동률</th>
                                <th style="text-align:right">매수비중</th>
                                <th>메시지</th>
                            </tr>
                        </thead>
                        <tbody id="alert-tbody"></tbody>
                    </table>
                </div>
            </section>

            <!-- 설정 뷰 (초기엔 숨김) -->
            <section id="settings-view" class="settings-view" style="display: none;">
                <header class="main-header">
                    <h1>시스템 설정</h1>
                </header>
                
                <div class="settings-grid">
                    <div class="settings-card">
                        <h3>데이터 수집기 관리</h3>
                        <p class="status-text">상태: <span id="collector-status">조회 중...</span></p>
                        <div class="button-group">
                            <button id="btn-toggle" class="btn" style="width: 100%;">조회 중...</button>
                        </div>
                    </div>

                    <div class="settings-card">
                        <h3>알림 조건 설정</h3>
                        <div class="input-group">
                            <label>가격 급등 기준 (%)</label>
                            <input type="number" id="setting-price-threshold" class="dark-input" value="1.5" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>거래량 폭증 배수</label>
                            <input type="number" id="setting-vol-multiplier" class="dark-input" value="3.0" step="0.5">
                        </div>
                        <div class="input-group">
                            <label>RSI 과매수 기준</label>
                            <input type="number" id="setting-rsi-sell" class="dark-input" value="70">
                        </div>
                        <div class="input-group">
                            <label>RSI 과매도 기준</label>
                            <input type="number" id="setting-rsi-buy" class="dark-input" value="30">
                        </div>
                        <button id="btn-save-alerts" class="btn primary" style="width: 100%; margin-top: 15px;">설정 저장</button>
                    </div>

                    <div class="settings-card full-width" style="grid-column: span 2;">
                        <h3>보유 전략 관리</h3>
                        <div id="strategy-list" class="strategy-list-grid">
                            <!-- 에이전트가 동적으로 전략 카드를 생성합니다 -->
                            <p class="status-text">전략 목록을 불러오는 중...</p>
                        </div>
                    </div>

                    <div class="settings-card">
                        <h3>데이터베이스 관리</h3>
                        <p class="status-text">불필요한 과거 데이터를 정리합니다.</p>
                        <div class="input-group" style="margin-top: 15px;">
                            <label>기준 날짜 선택</label>
                            <input type="date" id="cleanup-date" class="dark-input">
                        </div>
                        <button id="btn-cleanup" class="btn danger" style="width: 100%; margin-top: 15px;">선택 날짜 이전 삭제</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <div id="alert-container" class="alert-container"></div>
    <script src="app.js"></script>
</body>
</html>
